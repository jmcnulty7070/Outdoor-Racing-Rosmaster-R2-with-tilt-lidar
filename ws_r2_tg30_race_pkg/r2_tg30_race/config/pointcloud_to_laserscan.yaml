# Slice in base_footprint so height thresholds are relative to ground level.
target_frame: base_footprint
transform_tolerance: 0.08
# Reject flat ground hits, but keep low curb / grass returns above the ground.
min_height: 0.02
max_height: 0.22
angle_min: -1.5708
angle_max: 1.5708
angle_increment: 0.00872665
scan_time: 0.0667
range_min: 0.12
range_max: 12.0
use_inf: true
inf_epsilon: 1.0
concurrency_level: 1
